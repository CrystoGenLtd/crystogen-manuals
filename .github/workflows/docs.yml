name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps for PDF rendering
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-with-pdf

      - name: Build docs and PDF
        run: mkdocs build --strict
        env:
          ENABLE_PDF_EXPORT: 1

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - uses: actions/deploy-pages@v4
        id: deployment
