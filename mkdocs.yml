site_name: CrystoGen
site_description: Installation and usage guide for CrystoGen
site_url: https://crystogenltd.github.io/crystogen-manuals/
repo_url: https://github.com/CrystoGenLtd/crystogen-manuals
repo_name: CrystoGenLtd/crystogen-manuals

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.tabs.link
    - content.code.copy

nav:
  - Home: index.md
  - Installation:
    - Windows: installation/windows.md
    - macOS: installation/macos.md
    - Linux: installation/linux.md
  - Running CrystoGen: running.md
  - Input files: input-files.md
  - Licence key: licence-key.md
  - Running OCC: occ.md
  - ToposPro Light: topospro.md
  - CG Visualiser: cgvisualiser.md
  - Side menu: side-menu.md
  - GUI Tabs:
    - Overview: tabs/index.md
    - Energy prediction: tabs/energy-prediction.md
    - Structure options: tabs/structure-options.md
    - Simulation options: tabs/simulation-options.md
    - Supersaturation profile: tabs/supersaturation.md
    - Crystal colouring: tabs/crystal-colouring.md
    - Net options: tabs/net-options.md
    - Tile options: tabs/tile-options.md
    - Screw dislocations: tabs/screw-dislocations.md
    - Screw stress: tabs/screw-stress.md
    - Growth modifier: tabs/growth-modifier.md
    - Diffusion: tabs/diffusion.md
    - Nucleation: tabs/nucleation.md
    - Surface: tabs/surface.md
    - Seed engineering: tabs/seed-engineering.md
    - Excess supersaturation: tabs/excess-supersaturation.md

hooks:
  - docs/hooks.py

plugins:
  - search
  - with-pdf:
      author: CrystoGen Ltd
      cover_title: CrystoGen
      cover_subtitle: Installation & Usage Guide
      output_path: pdf/crystogen-manual.pdf
      enabled_if_env: ENABLE_PDF_EXPORT
      custom_template_path: docs/templates

extra_css:
  - pdf.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
